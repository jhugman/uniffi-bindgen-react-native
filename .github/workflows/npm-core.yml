name: Publish @ubjs/core to npmjs
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      dry-run:
        description: "Run without publishing to npm"
        type: boolean
        default: true
  workflow_call:

jobs:
  publish-core:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20.x"
          registry-url: "https://registry.npmjs.org"
      - run: cd typescript && npm install && npm run build

      - name: "📦 npm publish: @ubjs/core (dry-run)"
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.dry-run }}
        run: |
          echo "::notice::DRY RUN — not publishing to npm"
          cd typescript && npm publish --dry-run --access public

      - name: "📦 npm publish: @ubjs/core"
        if: ${{ github.event_name == 'release' || github.event_name == 'workflow_call' || !inputs.dry-run }}
        run: cd typescript && npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
